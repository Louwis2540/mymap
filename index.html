<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>อัปเดตข้อมูลโรงไฟฟ้าชีวมวล เขต 7</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Sarabun', sans-serif; background: #f4f7f6; overflow: hidden; }
        #map { height: 100vh; width: 100%; }
        
        /* สไตล์ Dashboard */
        .dashboard-header {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 10px; pointer-events: none;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.95); padding: 8px 16px; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 8px;
            border: 2px solid #1565c0; pointer-events: auto; backdrop-filter: blur(5px);
        }
        .stat-card i { color: #1565c0; font-size: 18px; }
        .stat-card .label { font-size: 12px; color: #666; font-weight: 600; }
        .stat-card .value { font-size: 18px; color: #1565c0; font-weight: 800; }

        /* แผงควบคุม */
        .side-control {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            width: 280px; background: white; padding: 20px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); max-height: 90vh; overflow-y: auto;
        }
        .title { color: #1565c0; font-size: 18px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .filter-group { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .filter-label { font-size: 13px; font-weight: 700; color: #444; margin-bottom: 10px; display: block; }
        
        select, input[type="file"] {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;
            font-family: 'Sarabun'; font-size: 13px; margin-bottom: 10px;
        }
        
        .btn-primary {
            width: 100%; padding: 12px; background: #1565c0; color: white; border: none;
            border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-primary:hover { background: #0d47a1; }

        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 8px; cursor: pointer; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.2); }

        /* Marker Styles */
        .marker-power { color: #1565c0; font-size: 20px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); }
        
        /* Loading Overlay */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #1565c0; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-weight:600; color:#1565c0;">กำลังประมวลผลข้อมูลโรงไฟฟ้า...</p>
</div>

<div class="dashboard-header">
    <div class="stat-card">
        <i class="fa-solid fa-bolt-lightning"></i>
        <div>
            <div class="label">โรงไฟฟ้าชีวมวล/พลังงาน</div>
            <div class="value" id="count-power">0</div>
        </div>
    </div>
</div>

<div class="side-control">
    <div class="title"><i class="fa-solid fa-charging-station"></i> Bio-Power Portal</div>
    
    <div class="filter-group">
        <span class="filter-label">ค้นหาโรงไฟฟ้า</span>
        <select id="factorySelect" onchange="focusFactory()">
            <option value="">-- เลือกรายชื่อโรงไฟฟ้า --</option>
        </select>
        <button class="btn-primary" onclick="focusFactory()" style="margin-top:5px;">🔍 ตรวจสอบพิกัด</button>
    </div>

    <div class="filter-group">
        <span class="filter-label">ข้อมูลสภาพอากาศ (Real-time)</span>
        <label class="legend-item">
            <input type="checkbox" id="windToggle" checked onchange="refreshWind()"> 
            <i class="fa-solid fa-wind" style="color:#607d8b"></i> แสดงทิศทางลม
        </label>
    </div>

    <div class="filter-group">
        <span class="filter-label">พื้นที่จังหวัดในเขต 7</span>
        <div id="provinceFilters"></div>
    </div>

    <div style="font-size:11px; color:#999; text-align:center;">
        อัปเดตข้อมูลล่าสุดจากไฟล์ CSV/Excel<br>เชื่อมโยง ขอนแก่น-ร้อยเอ็ด-กาฬสินธุ์
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ฐานข้อมูลโรงไฟฟ้าที่รวบรวมจากไฟล์
    const powerPlants = [
        // ขอนแก่น
        { name: "บริษัท ขอนแก่นกรีนพาวเวอร์ จำกัด", lat: 15.85829775, lon: 102.6222808, district: "พล", province: "ขอนแก่น", type: "ชีวมวล" },
        { name: "บริษัท พลพาวเวอร์ ซัพพลาย จำกัด", lat: 15.84186011, lon: 102.6132026, district: "พล", province: "ขอนแก่น", type: "ไฟฟ้า" },
        { name: "บริษัท ฟินิคซ พัลพ แอนด์ เพเพอร์ จำกัด (มหาชน)", lat: 16.69980177, lon: 102.7492542, district: "น้ำพอง", province: "ขอนแก่น", type: "ไฟฟ้า" },
        { name: "บริษัท มิตรผล ไบโอ-เพาเวอร์ (ภูเวียง) จำกัด", lat: 16.49625645, lon: 102.4262672, district: "หนองเรือ", province: "ขอนแก่น", type: "ชีวมวล" },
        { name: "บริษัท แอ๊ดวานซ์ เอเชีย เพาเวอร์ แพลนท์ จำกัด", lat: 16.67826122, lon: 102.8180753, district: "น้ำพอง", province: "ขอนแก่น", type: "ไฟฟ้า" },
        { name: "โรงงานผลิตพลังงานไฟฟ้าจากเชื้อเพลิงก๊าซชีวภาพภูผาม่าน", lat: 16.67541569, lon: 101.824358, district: "ภูผาม่าน", province: "ขอนแก่น", type: "ก๊าซชีวภาพ" },
        { name: "โรงไฟฟ้าพลังความร้อนร่วมน้ำพอง", lat: 16.68351353, lon: 102.7359319, district: "น้ำพอง", province: "ขอนแก่น", type: "ความร้อนร่วม" },
        // กาฬสินธุ์
        { name: "บริษัท มิตรผล ไบโอ-เพาเวอร์ (กาฬสินธุ์) จำกัด", lat: 16.46879524, lon: 104.04076774, district: "กุฉินารายณ์", province: "กาฬสินธุ์", type: "ชีวมวล" },
        { name: "บริษัท อีสานไบโอเพาเวอร์ จำกัด", lat: 16.92852853, lon: 103.54262517, district: "สามชัย", province: "กาฬสินธุ์", type: "ชีวมวล" },
        // ร้อยเอ็ด
        { name: "บริษัท เอ็นเนอร์จี พลัส จำกัด (สาขา1)", lat: 14.71738992, lon: 102.37676798, district: "โพนทอง", province: "ร้อยเอ็ด", type: "ก๊าซชีวภาพ" },
        { name: "บริษัท แอ๊ดวานซ์ คลีน เพาเวอร์ จำกัด", lat: 16.27656044, lon: 104.01235482, district: "โพนทอง", province: "ร้อยเอ็ด", type: "ชีวมวล" }
    ];

    const provinceColors = { "ขอนแก่น": "#fbc02d", "กาฬสินธุ์": "#03a9f4", "ร้อยเอ็ด": "#e91e63", "มหาสารคาม": "#4caf50" };

    const map = L.map('map', { zoomControl: false }).setView([16.3, 103.2], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { opacity: 0.7 }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    const factoryLayer = L.layerGroup().addTo(map);
    const windLayer = L.layerGroup().addTo(map);
    const districtLayer = L.layerGroup().addTo(map);

    function initFilters() {
        const provinces = [...new Set(powerPlants.map(p => p.province))];
        const filterDiv = document.getElementById('provinceFilters');
        const select = document.getElementById('factorySelect');

        provinces.forEach(prov => {
            const label = document.createElement('label');
            label.className = 'legend-item';
            label.innerHTML = `<input type="checkbox" checked value="${prov}" onchange="renderMarkers()"> <span class="dot" style="background:${provinceColors[prov]}"></span> ${prov}`;
            filterDiv.appendChild(label);
        });

        powerPlants.sort((a,b) => a.name.localeCompare(b.name)).forEach((p, idx) => {
            const opt = document.createElement('option');
            opt.value = idx;
            opt.text = `${p.province} | ${p.name}`;
            select.appendChild(opt);
        });
    }

    function renderMarkers() {
        factoryLayer.clearLayers();
        const checkedProvs = Array.from(document.querySelectorAll('#provinceFilters input:checked')).map(i => i.value);
        let count = 0;

        powerPlants.forEach((p, idx) => {
            if (!checkedProvs.includes(p.province)) return;
            count++;

            const marker = L.marker([p.lat, p.lon], {
                icon: L.divIcon({
                    html: `<i class="fa-solid fa-bolt-lightning marker-power" style="color:${provinceColors[p.province]}"></i>`,
                    className: '', iconSize: [24, 24], iconAnchor: [12, 12]
                })
            });

            marker.bindPopup(`
                <div style="font-family:'Sarabun'; width:220px;">
                    <div style="font-weight:800; color:#1565c0; font-size:14px; margin-bottom:5px;">${p.name}</div>
                    <div style="font-size:12px; color:#666;">
                        <b>ประเภท:</b> ${p.type}<br>
                        <b>ที่อยู่:</b> อ.${p.district} จ.${p.province}<br>
                        <hr style="border:0; border-top:1px solid #eee; margin:8px 0;">
                        <a href="https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lon}" target="_blank" style="color:#1565c0; text-decoration:none; font-weight:600;">🌏 ดูบน Google Maps</a>
                    </div>
                </div>
            `);
            marker.addTo(factoryLayer);
        });
        document.getElementById('count-power').innerText = count;
    }

    async function fetchWindData(lat, lon) {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const data = await res.json();
            return data.current_weather;
        } catch (e) { return null; }
    }

    async function drawWindImpact(lat, lon) {
        windLayer.clearLayers();
        if (!document.getElementById('windToggle').checked) return;

        const wind = await fetchWindData(lat, lon);
        if (!wind) return;

        const angle = (wind.winddirection + 180) % 360; // ทิศที่ลมพัดไป
        const dist = 5000; // ระยะ 5 กม.
        
        const center = L.latLng(lat, lon);
        const rad = Math.PI / 180;
        
        // วาดรูปกรวยลม (Plume)
        const p1 = getPoint(center, dist, angle - 25);
        const p2 = getPoint(center, dist, angle + 25);

        L.polygon([center, p1, p2], {
            color: '#607d8b', weight: 1, fillColor: '#90a4ae', fillOpacity: 0.4, dashArray: '5,5'
        }).addTo(windLayer).bindTooltip(`ทิศทางลมขณะนี้: พัดจาก ${wind.winddirection}° ไปทาง ${Math.round(angle)}°<br>ความเร็ว: ${wind.windspeed} กม./ชม.`, {sticky: true});
    }

    function getPoint(center, dist, angle) {
        const d2r = Math.PI / 180;
        const lat1 = center.lat * d2r;
        const lon1 = center.lng * d2r;
        const brng = angle * d2r;
        const R = 6378137;

        const lat2 = Math.asin(Math.sin(lat1) * Math.cos(dist / R) + Math.cos(lat1) * Math.sin(dist / R) * Math.cos(brng));
        const lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(dist / R) * Math.cos(lat1), Math.cos(dist / R) - Math.sin(lat1) * Math.sin(lat2));

        return [lat2 / d2r, lon2 / d2r];
    }

    window.focusFactory = function() {
        const val = document.getElementById('factorySelect').value;
        if (val === "") return;
        const p = powerPlants[val];
        map.flyTo([p.lat, p.lon], 13);
        drawWindImpact(p.lat, p.lon);
    };

    window.refreshWind = function() {
        const val = document.getElementById('factorySelect').value;
        if (val !== "") drawWindImpact(powerPlants[val].lat, powerPlants[val].lon);
    };

    // โหลด Boundary จังหวัด (GeoJSON)
    async function loadBoundaries() {
        try {
            const res = await fetch('https://raw.githubusercontent.com/chingchai/OpenGISData-Thailand/master/provinces.geojson');
            const data = await res.json();
            const targetProvs = ["ขอนแก่น", "กาฬสินธุ์", "ร้อยเอ็ด", "มหาสารคาม"];
            
            L.geoJSON(data, {
                filter: (f) => targetProvs.includes(f.properties.pro_th),
                style: (f) => ({
                    color: provinceColors[f.properties.pro_th],
                    weight: 2, fillOpacity: 0.05
                })
            }).addTo(districtLayer);
        } catch (e) {}
        
        document.getElementById('loader').style.display = 'none';
    }

    initFilters();
    renderMarkers();
    loadBoundaries();

</script>
</body>
</html>
